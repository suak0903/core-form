<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>core:form — Pilates & Reformer Studio Essen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
<style>
/* page-specific overrides for index.html (chrome lives in css/site.css) */
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const NAV_IDS = ['angebote','studios','ueber-uns','ausbildung','preise','kontakt'];
const NAV_LABELS = ['Angebote','Studios','Über uns','Ausbildung','Preise','Kontakt'];

const App = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [activeId, setActiveId] = React.useState('');
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const [popupOpen, setPopupOpen] = React.useState(false);
  const [newsletterHtml, setNewsletterHtml] = React.useState('');
  const [newsletterError, setNewsletterError] = React.useState(false);
  const [newsletterSent, setNewsletterSent] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);
  const formRef = React.useRef(null);
  const popupCloseRef = React.useRef(null);
  const lastFocusRef = React.useRef(null);

  React.useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 40);
      if (window.scrollY < 80) setActiveId('');
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  React.useEffect(() => {
    const lock = mobileOpen || popupOpen;
    document.body.style.overflow = lock ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [mobileOpen, popupOpen]);

  React.useEffect(() => {
    if (!popupOpen || newsletterHtml || newsletterError) return;
    let cancelled = false;
    fetch('data/newsletter.html', { cache: 'no-cache' })
      .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.text(); })
      .then(html => { if (!cancelled) setNewsletterHtml(html); })
      .catch(() => { if (!cancelled) setNewsletterError(true); });
    return () => { cancelled = true; };
  }, [popupOpen, newsletterHtml, newsletterError]);

  React.useEffect(() => {
    if (!popupOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') closePopup(); };
    document.addEventListener('keydown', onKey);
    const t = setTimeout(() => { if (popupCloseRef.current) popupCloseRef.current.focus(); }, 60);
    return () => { document.removeEventListener('keydown', onKey); clearTimeout(t); };
  }, [popupOpen]);

  React.useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveId(e.target.id); });
    }, { rootMargin: '-40% 0px -50% 0px' });
    NAV_IDS.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, []);

  // Handle cross-page anchor links: when arriving at index.html#angebote etc.,
  // scroll to the matching section after React mounts.
  React.useEffect(() => {
    if (!window.location.hash) return;
    const id = window.location.hash.slice(1);
    const el = document.getElementById(id);
    if (!el) return;
    requestAnimationFrame(() => {
      window.scrollTo({
        top: el.getBoundingClientRect().top + window.scrollY - 68,
        behavior: 'auto'
      });
    });
  }, []);

  const scroll = (id) => {
    setMobileOpen(false);
    document.body.style.overflow = '';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (id === 'hero') {
      setActiveId('');
      window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
      return;
    }
    const el = document.getElementById(id);
    if (el) {
      window.scrollTo({
        top: el.getBoundingClientRect().top + window.scrollY - 68,
        behavior: reduceMotion ? 'auto' : 'smooth'
      });
    }
  };

  const onSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
    if (formRef.current) formRef.current.reset();
  };

  const openPopup = () => {
    lastFocusRef.current = document.activeElement;
    setMobileOpen(false);
    setPopupOpen(true);
  };
  const closePopup = () => {
    setPopupOpen(false);
    if (lastFocusRef.current && typeof lastFocusRef.current.focus === 'function') {
      setTimeout(() => lastFocusRef.current.focus(), 0);
    }
  };

  const onNewsletterSubmit = (e) => {
    e.preventDefault();
    setNewsletterSent(true);
    e.target.reset();
  };

  return (
    <div>
      <a href="#main-content" className="skip-link">Zum Inhalt springen</a>

      {/* NAV */}
      <header className={`nav${scrolled ? ' scrolled' : ''}${mobileOpen ? ' menu-open' : ''}`}>
        <div className="nav__inner container">
          <a
            href="#hero"
            className="nav__logo"
            aria-label="core:form Startseite"
            onClick={(e) => { e.preventDefault(); scroll('hero'); }}
          >
            <img src={scrolled && !mobileOpen ? 'media/RZ_Logo_CoreForm_Gudula.png' : 'media/RZ_Logo_CoreForm_Gudula_weiss_pink.png'} alt="core:form" />
          </a>
          <nav className="nav__links" aria-label="Hauptnavigation">
            {NAV_IDS.map((id, i) => (
              <a
                key={id}
                href={`#${id}`}
                onClick={(e) => { e.preventDefault(); scroll(id); }}
                className={activeId === id ? 'active' : ''}
                aria-current={activeId === id ? 'page' : undefined}
              >
                {NAV_LABELS[i]}
              </a>
            ))}
          </nav>
          <div className="nav__cta-group">
            <a href="buchung.html" className="btn btn--accent nav__cta">buchen</a>
            <button type="button" className="btn btn--accent nav__cta nav__cta--news" onClick={openPopup}>News</button>
          </div>
          <button
            type="button"
            className={`nav__hamburger${mobileOpen ? ' open' : ''}`}
            aria-label={mobileOpen ? 'Menü schließen' : 'Menü öffnen'}
            aria-expanded={mobileOpen}
            aria-controls="mobile-menu"
            onClick={() => setMobileOpen(o => !o)}
          >
            <span /><span /><span />
          </button>
        </div>
      </header>

      {/* Mobile menu — außerhalb des headers, damit position:fixed korrekt funktioniert */}
      <nav
        id="mobile-menu"
        className={`nav__mobile${mobileOpen ? ' open' : ''}`}
        aria-label="Mobile Navigation"
        aria-hidden={!mobileOpen}
      >
        {NAV_IDS.map((id, i) => (
          <a
            key={id}
            href={`#${id}`}
            onClick={(e) => { e.preventDefault(); scroll(id); }}
            tabIndex={mobileOpen ? 0 : -1}
            className={activeId === id ? 'active' : ''}
            aria-current={activeId === id ? 'page' : undefined}
          >{NAV_LABELS[i]}</a>
        ))}
        <div className="nav__mobile-actions">
          <a href="buchung.html" className="btn btn--accent" tabIndex={mobileOpen ? 0 : -1}>buchen</a>
          <button type="button" className="btn btn--accent" tabIndex={mobileOpen ? 0 : -1} onClick={openPopup}>News</button>
        </div>
        <div className="nav__mobile-social">
          <a href="https://instagram.com/coreform_essen" target="_blank" rel="noopener noreferrer" aria-label="core:form auf Instagram (öffnet in neuem Tab)" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true" focusable="false"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="https://facebook.com/evapilates.de" target="_blank" rel="noopener noreferrer" aria-label="core:form auf Facebook (öffnet in neuem Tab)" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true" focusable="false"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          </a>
          <a href="https://youtube.com/channel/UCPZpD1CyB2Vo82C0-_lxUMg" target="_blank" rel="noopener noreferrer" aria-label="core:form auf YouTube (öffnet in neuem Tab)" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true" focusable="false"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-1.96C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.4 19.54C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
          </a>
        </div>
      </nav>

      {/* Newsletter popup — slidet von rechts ein, Inhalt aus data/newsletter.html */}
      <div
        className={`newsletter-pop__backdrop${popupOpen ? ' open' : ''}`}
        onClick={closePopup}
        aria-hidden="true"
      />
      <aside
        className={`newsletter-pop${popupOpen ? ' open' : ''}`}
        role="dialog"
        aria-modal="true"
        aria-label="Newsletter"
        aria-hidden={!popupOpen}
      >
        <div className="newsletter-pop__head">
          <span className="label">Newsletter</span>
          <button
            type="button"
            ref={popupCloseRef}
            className="newsletter-pop__close"
            aria-label="Newsletter schließen"
            onClick={closePopup}
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" aria-hidden="true" focusable="false">
              <line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" />
            </svg>
          </button>
        </div>
        <div
          className="newsletter-pop__body"
          onSubmit={onNewsletterSubmit}
        >
          {newsletterError ? (
            <p>Newsletter-Inhalt konnte nicht geladen werden. Bitte später erneut versuchen.</p>
          ) : newsletterHtml ? (
            <React.Fragment>
              <div dangerouslySetInnerHTML={{ __html: newsletterHtml }} />
              {newsletterSent && (
                <div className="form-success" role="status" aria-live="polite">
                  <strong>Danke!</strong>
                  Wir melden uns bei dir.
                </div>
              )}
            </React.Fragment>
          ) : (
            <p>Wird geladen …</p>
          )}
        </div>
      </aside>

      <main id="main-content">

      {/* HERO */}
      <section className="hero" id="hero" aria-labelledby="hero-headline">
        <img
          className="hero__img"
          src="media/COREFORM_web_015.jpg"
          alt=""
          aria-hidden="true"
          fetchpriority="high"
          decoding="async"
        />
        <div className="hero__overlay" aria-hidden="true" />
        <div className="hero__content container">
          <h1 className="hero__headline" id="hero-headline">
            Kraft.<br />Kontrolle.<br /><em>Bewegung.</em>
          </h1>
          <p className="hero__sub">Reformer Pilates &nbsp;·&nbsp; Pilates Matte &nbsp;·&nbsp; Barre Workout</p>
          <div className="hero__actions">
            <button type="button" className="btn btn--accent" onClick={() => scroll('angebote')}>Kursangebote entdecken</button>
            <button type="button" className="btn btn--ghost" onClick={() => scroll('studios')}>Unsere Studios</button>
          </div>
        </div>
        <div className="hero__stats" role="list" aria-label="core:form auf einen Blick">
          {[['2','Studios in Essen'],['max. 9','Teilnehmer:innen'],['3','Kursformate']].map(([n,l]) => (
            <div className="hero__stat" key={l} role="listitem">
              <strong>{n}</strong><span>{l}</span>
            </div>
          ))}
        </div>
      </section>

      {/* MANIFESTO */}
      <section className="manifesto">
        <div className="container">
          <div className="manifesto__inner">
            <p className="manifesto__quote">Training, das einfach&nbsp;<em>gut&nbsp;tut.</em></p>
            <p className="manifesto__body">
              core:form steht für ganzheitliches Bewegen – präzise angeleitet, persönlich begleitet, in kleinen Gruppen. Für Kraft, Stabilität und ein tiefes Wohlbefinden.
            </p>
          </div>
        </div>
      </section>

      {/* ANGEBOTE */}
      <section className="angebote" id="angebote">
        <div className="container">
          <div className="section-head">
            <span className="label">Was wir anbieten</span>
            <h2>Kursangebote</h2>
          </div>
          <div className="angebote__grid">
            {[
              { img:'media/COREFORM_web_005.jpg', tag:'Studio Südviertel', title:'Reformer\nPilates', desc:'Training an der Reformer-Apparatur in Kleingruppen – präzise angeleitet für maximale Wirkung.', link:'buchung-suedviertel.html' },
              { img:'media/Eva-Pilates 01.jpg',   tag:'Studio Rüttenscheid', title:'Pilates\nMatte',   desc:'Achtsam angeleitetes Training in Kleingruppen – zugänglich und tiefgründig zugleich.', link:'buchung-ruettenscheid.html' },
              { img:'media/Eva-Pilates 06.jpg', tag:'Studio Rüttenscheid', title:'Barre\nWorkout', desc:'Dynamisches Ganzkörpertraining – Pilates trifft Tanz und Kraft. Eleganz trifft Intensität.', link:'buchung-ruettenscheid.html' },
              { img:'media/COREFORM_web_009.jpg', tag:'Beide Studios',        title:'Personal\nTraining', desc:'1:1 oder 2:1 – individuelles Pilatestraining auf der Matte oder am Reformer.' },
              { img:'media/Eva-Pilates 07.jpg', tag:'Studio Südviertel',    title:'Raum-\n­vermietung', desc:'Zwei Balanced Body Reformer – ideal für Kolleg:innen und externe Trainer:innen.' },
            ].map((c, i) => (
              <div className="kurs-card" key={i}>
                <div className="kurs-card__img-wrap">
                  <img src={c.img} alt={c.title.replace('\n',' ')} loading="lazy" decoding="async" />
                </div>
                <div className="kurs-card__body">
                  <span className="kurs-card__tag">{c.tag}</span>
                  <h3>{c.title.split('\n').map((l,j) => <React.Fragment key={j}>{l}{j===0&&<br/>}</React.Fragment>)}</h3>
                  <p>{c.desc}</p>
                  {c.link ? (
                    <a className="text-link" href={c.link}>Mehr erfahren →</a>
                  ) : (
                    <a
                      className="text-link"
                      href="#kontakt"
                      onClick={(e) => { e.preventDefault(); scroll('kontakt'); }}
                    >Anfragen →</a>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FEATURE BANNER */}
      <section className="feature-banner" aria-label="Zitat">
        <img
          className="feature-banner__img"
          src="media/COREFORM_web_010.jpg"
          alt=""
          aria-hidden="true"
          loading="lazy"
          decoding="async"
        />
        <div className="feature-banner__content container">
          <blockquote>
            „Jede Bewegung zählt –<br /><em>wenn&nbsp;sie&nbsp;präzise&nbsp;ist.</em>"
          </blockquote>
          <p>Maximal 9 Teilnehmer:innen pro Kurs. Persönliche Anleitung. Echte Wirkung.</p>
        </div>
      </section>

      {/* STUDIOS */}
      <section className="studios" id="studios">
        <div className="container">
          <div className="section-head">
            <span className="label">Wo wir sind</span>
            <h2>Unsere Studios</h2>
          </div>
        </div>
        <div className="studios__split">
          <article className="studio-panel">
            <img src="media/Eva-Pilates 02.jpg" alt="Trainingsraum im Studio Rüttenscheid" loading="lazy" decoding="async" />
            <div className="studio-panel__overlay" aria-hidden="true" />
            <div className="studio-panel__content">
              <img src="media/RZ_Logo_CoreForm_Gudula.png" alt="" aria-hidden="true" loading="lazy" decoding="async" />
              <div>
                <span className="studio-panel__nr">Studio 01</span>
                <h3>Rüttenscheid</h3>
                <p>Pilates Matte &amp; Barre Workout</p>
              </div>
              <a href="buchung-ruettenscheid.html" className="btn btn--ghost">Info &amp; Buchung</a>
            </div>
          </article>
          <article className="studio-panel">
            <img src="media/COREFORM_web_002.jpg" alt="Trainingsraum im Studio Südviertel" loading="lazy" decoding="async" />
            <div className="studio-panel__overlay" aria-hidden="true" />
            <div className="studio-panel__content">
              <img src="media/RZ_Logo_CoreForm_Moltke.png" alt="" aria-hidden="true" loading="lazy" decoding="async" />
              <div>
                <span className="studio-panel__nr">Studio 02</span>
                <h3>Südviertel</h3>
                <p>Reformer Pilates &amp; Raumvermietung</p>
              </div>
              <a href="buchung-suedviertel.html" className="btn btn--ghost">Info &amp; Buchung</a>
            </div>
          </article>
        </div>
      </section>

      {/* ABOUT */}
      <section className="about" id="ueber-uns">
        <div className="container">
          <div className="about__inner">
            <div className="about__media">
              <img src="media/Eva & Jelena.jpg" alt="Eva und Jelena – Gründerinnen von core:form" loading="lazy" decoding="async" />
            </div>
            <div className="about__text">
              <div className="section-head">
                <span className="label">Über uns</span>
                <h2>Bewegung<br />mit Haltung.</h2>
              </div>
              <p>core:form wurde aus der Überzeugung gegründet, dass Pilates mehr ist als ein Workout – es ist eine Praxis. Eine, die Körper und Geist verbindet, präzises Arbeiten mit echter Freude am Bewegen vereint.</p>
              <p>Eva, Gründerin und leidenschaftliche Pilates-Trainerin, hat beide Studios in Essen aufgebaut. Mit einem Team erfahrener Trainer:innen bietet core:form ein Umfeld, in dem jede:r das Beste aus sich herausholen kann.</p>
              <div className="about__values">
                {[['Präzision','Jede Bewegung zählt'],['Wärme','Persönliche Begleitung'],['Gemeinschaft','Kleine Gruppen, großes Miteinander']].map(([t,s]) => (
                  <div className="about__value" key={t}>
                    <span className="about__value-line"></span>
                    <div className="about__value-text"><strong>{t}</strong><span>{s}</span></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* AUSBILDUNG */}
      <section className="ausbildung" id="ausbildung">
        <div className="container">
          <div className="ausbildung__inner">
            <div className="ausbildung__text">
              <span className="label">Ausbildung</span>
              <h2>Werde<br /><em>Pilates-Trainer:in.</em></h2>
              <p>core:form bietet strukturierte Ausbildungsprogramme für alle, die Pilates professionell unterrichten möchten. Fundiert, praxisnah und von erfahrenen Trainer:innen begleitet.</p>
              <a href="ausbildung.html" className="btn btn--accent">Zur Ausbildung</a>
            </div>
            <ul className="ausbildung__features">
              {['Zertifizierte Programme für Matte & Reformer','Erfahrene Ausbilder:innen','Kleine Ausbildungsgruppen','Praxis & Theorie in zwei Studios'].map(f => (
                <li key={f}><span className="check">✓</span><span>{f}</span></li>
              ))}
            </ul>
          </div>
        </div>
      </section>

      {/* PREISE */}
      <section className="preise" id="preise">
        <div className="container">
          <div className="section-head">
            <span className="label">Investition</span>
            <h2>Preise & Pakete</h2>
          </div>
          <div className="preise__grid">
            {[
              { format:'Reformer Pilates', prefix:'ab', price:'115 €', features:['Einsteigerkurs (mehrere Termine)','Maximal 9 Teilnehmer:innen','Studio Südviertel','Professionelle Anleitung'], featured:false },
              { format:'Pilates Matte', prefix:'Kurse', price:'ab 99 €', features:['Laufende Kurse & Blöcke','Verschiedene Trainer:innen','Studio Rüttenscheid','Alle Levels willkommen'], featured:true, badge:'Empfohlen' },
              { format:'Personal Training', prefix:'Individuell', price:'auf Anfrage', features:['1:1 oder 2:1 Sessions','Matte oder Reformer','Flexible Terminplanung','Maßgeschneidert für dich'], featured:false },
            ].map((p, i) => (
              <div className={`preis-card${p.featured ? ' preis-card--featured' : ''}`} key={i}>
                {p.badge && <span className="preis-card__badge">{p.badge}</span>}
                <span className="preis-card__format">{p.format}</span>
                <div className="preis-card__price">
                  <span>{p.prefix}</span><strong>{p.price}</strong>
                </div>
                <ul>{p.features.map(f => <li key={f}>{f}</li>)}</ul>
                <button
                  type="button"
                  className={`btn btn--full${p.featured ? ' btn--accent' : ' btn--outline'}`}
                  onClick={() => scroll('kontakt')}
                >{i===2 ? 'Anfragen' : 'Jetzt anfragen'}</button>
              </div>
            ))}
          </div>
          <p className="preise__note">Alle aktuellen Preise & Termine auf Anfrage oder direkt im Studio.</p>
        </div>
      </section>

      {/* KONTAKT */}
      <section className="kontakt" id="kontakt">
        <div className="container">
          <div className="section-head">
            <span className="label">Komm vorbei</span>
            <h2>Kontakt & Anfahrt</h2>
          </div>
          <div className="kontakt__grid">
            <div className="kontakt__info">
              <div className="kontakt__studios">
                <div className="kontakt__studio">
                  <strong>Studio Rüttenscheid</strong>
                  <p>Gudulastraße 5 (Innenhof)<br />45131 Essen</p>
                  <p className="kontakt__studio-kurse">Pilates Matte · Barre Workout</p>
                </div>
                <div className="kontakt__studio">
                  <strong>Studio Südviertel</strong>
                  <p>Moltkestraße 16<br />45128 Essen</p>
                  <p className="kontakt__studio-kurse">Reformer Pilates · Raumvermietung</p>
                </div>
              </div>
              <div className="kontakt__reach">
                <a href="tel:020185772137" className="kontakt__link">
                  <span className="kontakt__link-label">Telefon</span>
                  <span>0201 857 721 37</span>
                </a>
                <a href="mailto:info@core-form.de" className="kontakt__link">

                  <span>info@core-form.de</span>

            <form ref={formRef} className="kontakt__form" onSubmit={onSubmit} noValidate>

                <div className="form-group">
                  <label htmlFor="name">Name</label>
                  <input type="text" id="name" name="name" placeholder="Dein Name" autoComplete="name" required />
                </div>
                <div className="form-group">
                  <label htmlFor="email">E-Mail</label>
                  <input type="email" id="email" name="email" placeholder="deine@mail.de" autoComplete="email" inputMode="email" required />
                </div>
              </div>
              <div className="form-group">
                <label htmlFor="interesse">Interesse</label>
                <select id="interesse" name="interesse" defaultValue="" required>
                  <option value="" disabled>Kurs wählen …</option>

                  <option>Pilates Matte</option>
                  <option>Barre Workout</option>
                  <option>Personal Training</option>
                  <option>Raumvermietung</option>
                  <option>Ausbildung</option>

              </div>
              <div className="form-group">
                <label htmlFor="nachricht">Nachricht</label>
                <textarea id="nachricht" name="nachricht" rows="4" placeholder="Deine Frage oder Nachricht …"></textarea>

              <button type="submit" className="btn btn--accent btn--full">Nachricht senden</button>
              {submitted ? (
                <div className="form-success" role="status" aria-live="polite">
                  <strong>Danke für deine Nachricht.</strong>
                  Wir melden uns schnellstmöglich bei dir.

              <a href="faq.html">FAQ</a>
            </div>
          </div>
        </div>
      </footer>
