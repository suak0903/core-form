      // gesture, address-bar resize on iOS, focus jump, …) make sure we
      // actually land at 0 after the animation should have completed.
      setTimeout(() => {
        if (window.scrollY > 0) forceScrollTop();
      }, 700);
    };

    gestureEvents.forEach(evt =>
      window.addEventListener(evt, onUserGesture, { passive: true })
    );
    window.addEventListener('popstate', onPopState);

    // Arm the trap immediately when we land already scrolled — happens when
    // the user jumps from a subpage's mobile menu into a section anchor like
    // index.html#preise. Without this, the cross-page-anchor scroll alone
    // doesn't push the sentinel (no user gesture on this page yet), so the
    // first browser-back leaves the page instead of scrolling up. The
    // navigation that brought the user here grants the new document sticky
    // user activation, so this initial pushState is honored by the browser.
    const initialArm = setTimeout(() => {
      if (window.scrollY > THRESHOLD) pushSentinel();
    }, 80);

    return () => {
      clearTimeout(initialArm);
      gestureEvents.forEach(evt =>
        window.removeEventListener(evt, onUserGesture)
      );
      window.removeEventListener('popstate', onPopState);

  React.useEffect(() => {

              className={`about__media team-stage${teamStage === 1 ? ' team-stage--preview' : ''}${teamStage === 2 ? ' team-stage--expanded' : ''}`}
              onMouseEnter={() => setTeamHovered(true)}
              onMouseLeave={() => setTeamHovered(false)}
              onTouchStart={(e) => {
                if (e.touches && e.touches.length === 1) {
                  teamTouchStartRef.current = e.touches[0].clientX;
                }
              }}
              onTouchEnd={(e) => {
                if (teamTouchStartRef.current === null) return;
                const startX = teamTouchStartRef.current;
                teamTouchStartRef.current = null;
                const endX = (e.changedTouches && e.changedTouches[0]?.clientX) ?? startX;
                const delta = endX - startX;
                if (Math.abs(delta) < 40) return; // < 40 px = Tap, kein Swipe
                goTeam(delta < 0 ? 1 : -1);
              }}
            >
              {TEAM.map((m, i) => {
                const isActive = i === teamIndex;
                return (
                  <div
                    key={m.name}
                    className={`team-slide${isActive ? ' active' : ''}`}
                    aria-hidden={!isActive}
                    role="button"
                    tabIndex={isActive ? 0 : -1}
                    aria-expanded={isActive ? teamStage === 2 : undefined}
                    aria-label={`${m.name} – ${m.role}.`}
                    onClick={(e) => {
                      if (!isActive) return;
                      const isTouch = window.matchMedia('(hover: none), (pointer: coarse)').matches;
                      // Auf Touch: linke 22% = vorheriges Bild, rechte 22% = nächstes Bild,
                      // Mitte = Stage durchschalten. Auf Desktop: nur Stage durchschalten.
                      if (isTouch) {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        if (x < rect.width * 0.22) { goTeam(-1); return; }
                        if (x > rect.width * 0.78) { goTeam(1);  return; }
                      }
                      // Touch-Cycle: 0 → 1 → 2 → 1 → 2 → ... (Stage 0 nur via Outside-Tap/Esc).
                      // Desktop: Toggle 0 ↔ 2 (Hover liefert Stage 1 gratis).
                      setTeamStage(s => isTouch ? (s === 2 ? 1 : s + 1) : (s === 2 ? 0 : 2));
                    }}
                    onKeyDown={(e) => {
                      if (!isActive) return;
                      if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        const isTouch = window.matchMedia('(hover: none), (pointer: coarse)').matches;
                        setTeamStage(s => isTouch ? (s === 2 ? 1 : s + 1) : (s === 2 ? 0 : 2));
                      } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        goTeam(-1);
                      } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        goTeam(1);
                      }
                    }}
                  >
                    {m.img ? (
                      <img src={m.img} alt="" loading="lazy" decoding="async" />
                    ) : (
                      <span className="team-slide__placeholder" aria-hidden="true">{m.name.charAt(0)}</span>
                    )}
                    <span className="team-slide__overlay" aria-hidden="true" />
                    <div className="team-slide__caption">
                      <span className="team-slide__role">{m.role}</span>
                      <span className="team-slide__name">{m.name}</span>
                      <p className="team-slide__bio">{m.bio}</p>
                    </div>
                  </div>
                );
              })}
              <button
                type="button"
                className="team-arrow team-arrow--prev"
                aria-label="Vorherige Person"
                onClick={(e) => { e.stopPropagation(); goTeam(-1); }}
              >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" focusable="false"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button
                type="button"
                className="team-arrow team-arrow--next"
                aria-label="Nächste Person"
                onClick={(e) => { e.stopPropagation(); goTeam(1); }}
              >

              </button>
              <div className="team-pagination" aria-label="Team Navigation">
                {TEAM.map((m, i) => (

                      setTeamIndex(i);
                    }}
                  />
                ))}
              </div>
            </div>

<script>
(function(){
  if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  function parallax(){
    var img = document.querySelector('.hero__img');
    if (img) img.style.transform = 'translateY(' + (window.scrollY * 0.5) + 'px)';
  }
  window.addEventListener('scroll', parallax, {passive:true});
  parallax();
})();
</script>
<script>
(function(){
  function check(){
    var s=document.getElementById('kontakt');
    if(!s) return;
    var r=s.getBoundingClientRect();
    document.body.classList.toggle('rcv', r.top < window.innerHeight - 240 && r.bottom > 0);
  }
  function init(){
    if(!document.getElementById('kontakt')){setTimeout(init,200);return;}
    check();
    window.addEventListener('scroll',check,{passive:true});
  }
  setTimeout(init,400);
  document.addEventListener('cf:consent',function(){setTimeout(check,500);});
})();
</script>
