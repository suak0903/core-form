const App = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [activeId, setActiveId] = React.useState('');
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const [popupOpen, setPopupOpen] = React.useState(false);
  const [newsletterHtml, setNewsletterHtml] = React.useState('');
  const [newsletterError, setNewsletterError] = React.useState(false);
  const [newsletterSent, setNewsletterSent] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);
  const [teamIndex, setTeamIndex] = React.useState(0);
  const [teamHovered, setTeamHovered] = React.useState(false);
  const [teamExpanded, setTeamExpanded] = React.useState(false);
  const [priceModalKey, setPriceModalKey] = React.useState(null);
  const formRef = React.useRef(null);
  const popupCloseRef = React.useRef(null);
  const lastFocusRef = React.useRef(null);
  const teamTouchStartRef = React.useRef(null);

  const goTeam = (delta) => {
    setTeamIndex(i => (i + delta + TEAM.length) % TEAM.length);
    setTeamExpanded(false);
  };

  React.useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 40);
      if (window.scrollY < 80) setActiveId('');
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  React.useEffect(() => {
    const lock = mobileOpen || popupOpen || priceModalKey;
    document.body.style.overflow = lock ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [mobileOpen, popupOpen, priceModalKey]);

  // Esc schließt das Preis-Modal
  React.useEffect(() => {
    if (!priceModalKey) return;
    const onKey = (e) => { if (e.key === 'Escape') setPriceModalKey(null); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [priceModalKey]);

  React.useEffect(() => {
    if (!popupOpen || newsletterHtml || newsletterError) return;
    let cancelled = false;
    fetch('data/newsletter.html', { cache: 'no-cache' })
      .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.text(); })
      .then(html => { if (!cancelled) setNewsletterHtml(html); })
      .catch(() => { if (!cancelled) setNewsletterError(true); });
    return () => { cancelled = true; };
  }, [popupOpen, newsletterHtml, newsletterError]);

  React.useEffect(() => {
    if (!popupOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') closePopup(); };
    document.addEventListener('keydown', onKey);
    const t = setTimeout(() => { if (popupCloseRef.current) popupCloseRef.current.focus(); }, 60);
    return () => { document.removeEventListener('keydown', onKey); clearTimeout(t); };
  }, [popupOpen]);

  React.useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveId(e.target.id); });
    }, { rootMargin: '-40% 0px -50% 0px' });
    NAV_IDS.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, []);

  // Handle cross-page anchor links: when arriving at index.html#angebote etc.,
  // scroll to the matching section after React mounts.
  React.useEffect(() => {
    if (!window.location.hash) return;
    const id = window.location.hash.slice(1);
    const el = document.getElementById(id);
    if (!el) return;
    requestAnimationFrame(() => {
      window.scrollTo({
        top: el.getBoundingClientRect().top + window.scrollY - 68,
        behavior: 'auto'
      });
    });
  }, []);

  // Back-button trap: any back command (browser back, mouse-back, Android-back,
  // edge-swipe) while the user is scrolled away from the top scrolls them up
  // first; only at the top is a real navigation away from the page allowed.
  // The sentinel is pushed lazily (on first scroll) so a back press while still
  // at the top leaves immediately.
  React.useEffect(() => {
    const THRESHOLD = 50;
    let sentinelActive = false;

    const pushSentinel = () => {
      if (sentinelActive) return;
      try {
        window.history.pushState({ cfBackTrap: true }, '');
        sentinelActive = true;
      } catch (e) { /* some embedded contexts disallow pushState */ }
    };

    // Push from real user-gesture handlers — pushState in a plain 'scroll'
    // handler is not associated with transient user activation, so Chromium's
    // "same-document history skipping" intervention will skip our sentinel
    // when the user hits the browser's Back button. Wheel / touchmove /
    // keydown / pointerdown all carry activation.
    const onUserGesture = () => {
      if (window.scrollY > THRESHOLD) pushSentinel();
    };

    const forceScrollTop = () => {
      // Belt-and-braces: scroll-behavior:smooth on <html> is buggy on iOS Safari
      // and some Android Chromes, so we hit every scroll surface explicitly.
      window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
      if (document.documentElement) document.documentElement.scrollTop = 0;
      if (document.body) document.body.scrollTop = 0;
    };

    const onPopState = () => {
      // Sentinel was popped by the back action.
      sentinelActive = false;
      if (window.scrollY <= THRESHOLD) return; // at top → let next back leave naturally

      // Re-trap immediately so subsequent back presses keep firing popstate
      // (push BEFORE scrolling — pushState mid-smooth-scroll cancels the
      // animation in some mobile browsers).
      pushSentinel();

      // Any open overlay locks <body> via overflow:hidden, which on mobile
      // also blocks the scroll — close them first.
      setMobileOpen(false);
      setPopupOpen(false);
      setPriceModalKey(null);
      document.body.style.overflow = '';

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Defer to next frame so the body-unlock and React state flushes settle
      // before we kick off the scroll animation.
      requestAnimationFrame(() => {
        try {
          window.scrollTo({ top: 0, left: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
        } catch (e) {
          forceScrollTop();
        }
      });

      // Hard-snap fallback: if the smooth scroll got interrupted (touch
      // gesture, address-bar resize on iOS, focus jump, …) make sure we
      // actually land at 0 after the animation should have completed.
      setTimeout(() => {
        if (window.scrollY > 0) forceScrollTop();
      }, 700);
    };

    const gestureEvents = ['wheel', 'touchmove', 'keydown', 'pointerdown'];
    gestureEvents.forEach(evt =>
      window.addEventListener(evt, onUserGesture, { passive: true })
    );
    window.addEventListener('popstate', onPopState);

    // Arm the trap immediately when we land already scrolled — happens when
    // the user jumps from a subpage's mobile menu into a section anchor like
    // index.html#preise. Without this, the cross-page-anchor scroll alone
    // doesn't push the sentinel (no user gesture on this page yet), so the
    // first browser-back leaves the page instead of scrolling up. The
    // navigation that brought the user here grants the new document sticky
    // user activation, so this initial pushState is honored by the browser.
    const initialArm = setTimeout(() => {
      if (window.scrollY > THRESHOLD) pushSentinel();
    }, 80);

    return () => {
      clearTimeout(initialArm);
      gestureEvents.forEach(evt =>
        window.removeEventListener(evt, onUserGesture)
      );
      window.removeEventListener('popstate', onPopState);
    };
  }, []);

  // Team-Karussell: alle 4.5 s rotieren. Pausiert bei Hover (Desktop) und
  // wenn die Bio aufgeklappt ist. Bei prefers-reduced-motion komplett aus.
  React.useEffect(() => {
    if (teamHovered || teamExpanded) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const id = setInterval(() => {
      setTeamIndex(i => (i + 1) % TEAM.length);
    }, 4500);
    return () => clearInterval(id);
  }, [teamHovered, teamExpanded]);

  const scroll = (id) => {
    setMobileOpen(false);
    document.body.style.overflow = '';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (id === 'hero') {
      setActiveId('');
      window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
      return;
    }
    const el = document.getElementById(id);
    if (el) {
      window.scrollTo({
        top: el.getBoundingClientRect().top + window.scrollY - 68,
        behavior: reduceMotion ? 'auto' : 'smooth'
      });
    }
  };

  const onSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
    if (formRef.current) formRef.current.reset();
  };

  const openPopup = () => {
    lastFocusRef.current = document.activeElement;
    setMobileOpen(false);
    setPopupOpen(true);
  };
  const closePopup = () => {
    setPopupOpen(false);
    if (lastFocusRef.current && typeof lastFocusRef.current.focus === 'function') {
      setTimeout(() => lastFocusRef.current.focus(), 0);
    }
  };

  const onNewsletterSubmit = (e) => {
    e.preventDefault();
    setNewsletterSent(true);
    e.target.reset();
  };

  return (
    <div>
      <a href="#main-content" className="skip-link">Zum Inhalt springen</a>

      {/* NAV */}
      <header className={`nav${scrolled ? ' scrolled' : ''}${mobileOpen ? ' menu-open' : ''}`}>
        <div className="nav__inner container">
          <a
            href="#hero"
            className="nav__logo"
            aria-label="core:form Startseite"
            onClick={(e) => { e.preventDefault(); scroll('hero'); }}
          >
            <img src={scrolled && !mobileOpen ? 'media/RZ_Logo_CoreForm_Gudula.png' : 'media/RZ_Logo_CoreForm_Gudula_weiss_pink.png'} alt="core:form" />
          </a>
          <nav className="nav__links" aria-label="Hauptnavigation">
            {NAV_IDS.map((id, i) => (
              <a
                key={id}
                href={`#${id}`}
                onClick={(e) => { e.preventDefault(); scroll(id); }}
                className={activeId === id ? 'active' : ''}
                aria-current={activeId === id ? 'page' : undefined}
              >
                {NAV_LABELS[i]}
              </a>
            ))}
          </nav>
          <div className="nav__cta-group">
            <a href="buchung.html" className="btn btn--accent nav__cta">buchen</a>
            <button type="button" className="btn btn--accent nav__cta nav__cta--news" onClick={openPopup}>News</button>
          </div>
          <button
            type="button"
            className={`nav__hamburger${mobileOpen ? ' open' : ''}`}
            aria-label={mobileOpen ? 'Menü schließen' : 'Menü öffnen'}
            aria-expanded={mobileOpen}
            aria-controls="mobile-menu"
            onClick={() => setMobileOpen(o => !o)}
          >
            <span /><span /><span />
          </button>
        </div>
      </header>

      {/* Mobile menu — außerhalb des headers, damit position:fixed korrekt funktioniert */}
      <nav
        id="mobile-menu"
        className={`nav__mobile${mobileOpen ? ' open' : ''}`}
        aria-label="Mobile Navigation"
        aria-hidden={!mobileOpen}
      >
        {NAV_IDS.map((id, i) => (
          <a
            key={id}
            href={`#${id}`}
            onClick={(e) => { e.preventDefault(); scroll(id); }}
            tabIndex={mobileOpen ? 0 : -1}
            className={activeId === id ? 'active' : ''}
            aria-current={activeId === id ? 'page' : undefined}
          >{NAV_LABELS[i]}</a>
        ))}
        <div className="nav__mobile-actions">
          <a href="buchung.html" className="btn btn--accent" tabIndex={mobileOpen ? 0 : -1}>buchen</a>
          <button type="button" className="btn btn--accent" tabIndex={mobileOpen ? 0 : -1} onClick={openPopup}>News</button>
        </div>
        <div className="nav__mobile-social">
          <a href="https://instagram.com/coreform_essen" target="_blank" rel="noopener noreferrer" aria-label="core:form auf Instagram (öffnet in neuem Tab)" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true" focusable="false"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="https://facebook.com/evapilates.de" target="_blank" rel="noopener noreferrer" aria-label="core:form auf Facebook (öffnet in neuem Tab)" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true" focusable="false"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          </a>
          <a href="https://youtube.com/channel/UCPZpD1CyB2Vo82C0-_lxUMg" target="_blank" rel="noopener noreferrer" aria-label="core:form auf YouTube (öffnet in neuem Tab)" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true" focusable="false"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-1.96C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.4 19.54C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="galerie.html" aria-label="Galerie ansehen" tabIndex={mobileOpen ? 0 : -1}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" focusable="false"><rect x="3" y="3" width="18" height="18"/><circle cx="9" cy="9" r="1.8"/><path d="m21 15-4.5-4.5L6 21"/></svg>
          </a>
        </div>
      </nav>

      {/* Newsletter popup — slidet von rechts ein, Inhalt aus data/newsletter.html */}
      <div
        className={`newsletter-pop__backdrop${popupOpen ? ' open' : ''}`}
        onClick={closePopup}
        aria-hidden="true"
      />
      <aside
        className={`newsletter-pop${popupOpen ? ' open' : ''}`}
        role="dialog"
        aria-modal="true"
        aria-label="Newsletter"
        aria-hidden={!popupOpen}
      >
        <div className="newsletter-pop__head">
          <span className="label">Newsletter</span>
          <button
            type="button"
            ref={popupCloseRef}
            className="newsletter-pop__close"
            aria-label="Newsletter schließen"
            onClick={closePopup}
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" aria-hidden="true" focusable="false">
              <line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" />
            </svg>
          </button>
        </div>
        <div
          className="newsletter-pop__body"
          onSubmit={onNewsletterSubmit}
        >
          {newsletterError ? (
            <p>Newsletter-Inhalt konnte nicht geladen werden. Bitte später erneut versuchen.</p>
          ) : newsletterHtml ? (
            <React.Fragment>

              onMouseEnter={() => setTeamHovered(true)}
              onMouseLeave={() => setTeamHovered(false)}
              onTouchStart={(e) => {
                if (e.touches && e.touches.length === 1) {
                  teamTouchStartRef.current = e.touches[0].clientX;
                }
              }}
              onTouchEnd={(e) => {
                if (teamTouchStartRef.current === null) return;
                const startX = teamTouchStartRef.current;
                teamTouchStartRef.current = null;
                const endX = (e.changedTouches && e.changedTouches[0]?.clientX) ?? startX;
                const delta = endX - startX;
                if (Math.abs(delta) < 40) return; // < 40 px = Tap, kein Swipe
                goTeam(delta < 0 ? 1 : -1);
              }}
            >
              {TEAM.map((m, i) => {
                const isActive = i === teamIndex;
                return (
                  <div
                    key={m.name}
                    className={`team-slide${isActive ? ' active' : ''}`}
                    aria-hidden={!isActive}
                    role="button"
                    tabIndex={isActive ? 0 : -1}
                    aria-expanded={isActive ? teamExpanded : undefined}
                    aria-label={`${m.name} – ${m.role}. ${teamExpanded && isActive ? 'Bio ausblenden' : 'Bio einblenden'}`}
                    onClick={() => { if (isActive) setTeamExpanded(e => !e); }}
                    onKeyDown={(e) => {
                      if (!isActive) return;
                      if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        setTeamExpanded(v => !v);
                      } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        goTeam(-1);
                      } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        goTeam(1);
                      }
                    }}
                  >
                    {m.img ? (
                      <img src={m.img} alt="" loading="lazy" decoding="async" />
                    ) : (
                      <span className="team-slide__placeholder" aria-hidden="true">{m.name.charAt(0)}</span>

                    <div className="team-slide__caption">
                      <span className="team-slide__role">{m.role}</span>
                      <span className="team-slide__name">{m.name}</span>
                      <p className="team-slide__bio">{m.bio}</p>
                    </div>
                  </div>
                );
              })}

                className="team-arrow team-arrow--prev"
